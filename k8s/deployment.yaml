apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-retention-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-retention
  template:
    metadata:
      labels:
        app: customer-retention
    spec:
      containers:
      - name: api
        image: customer-retention:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: customer-retention-service
spec:
  selector:
    app: customer-retention
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: customer-retention-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: customer-retention-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
